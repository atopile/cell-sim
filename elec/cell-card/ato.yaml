requires-atopile: ^0.14.1

paths:
  src: .
  layout: ./layouts

builds:
    cell:
        entry: cell.ato:Cell
    thermistor:
        entry: thermistor.ato:Thermistor
    cell-card:
        entry: cell-card.ato:CellCard
    thermistor-card:
        entry: thermistor-card.ato:ThermistorCard
    base-card:
        entry: base-card.ato:BaseCard

# Historical registry dependencies kept commented for reference.
# Project-specific packages are pinned below as local file dependencies.
#
# dependencies:
#     #
#     # MCU + Networking (proven in Hyperion)
# - atopile/st-stm32h723
# - atopile/microchip-lan8742a
#
#     # I2C infrastructure
# - atopile/ti-tca9548a
# - atopile/ti-iso1640x
# - atopile/microchip-mcp4725
#
#     # Measurement
# - atopile/ti-ads1115      # fallback; ADS1219 package TBD
# - atopile/ti-ina185a1
#
#     # Power
# - atopile/ti-tpsm84209
# - atopile/ti-tpsm863257
# - atopile/ti-tlv75901
# - atopile/st-ldk220
# - atopile/tdpower-tdk20x
#
#     # GPIO + Temp
# - atopile/ti-tca6408
# - atopile/ti-tmp117
#
#     # Relays + Output
# - atopile/relays
#
#     # LEDs + UI
# - atopile/indicator-leds
#
#     # Connectors + Debug
# - atopile/usb-connectors
# - atopile/programming-headers
# - atopile/buttons
# - atopile/pin-headers
# - atopile/testpoints
# - atopile/mounting-holes
#
#     # DAC (thermistor card)
# - atopile/microchip-mcp4728
# - type: file
#   identifier: atopile/ylptech-byyxx
