requires-atopile: ^0.14.0

paths:
  src: .
  layout: ./layouts

builds:
  default:
    entry: tdpower-tdk20x.ato:TDPOWER_TDK20_driver
    hide_designators: true
    exclude_checks: ["PCB.requires_drc_check"]
  usage:
    entry: usage.ato:Usage
    hide_designators: true
    exclude_checks: ["PCB.requires_drc_check"]

package:
  identifier: atopile/tdpower-tdk20x
  repository: https://github.com/atopile/packages
  version: "0.2.0"
  authors:
    - name: atopile
      email: hi@atopile.io
  summary: TDPOWER TDK20 20W IsolatedDC-DC converter
  license: MIT
