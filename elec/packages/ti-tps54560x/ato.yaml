requires-atopile: ^0.12.4

paths:
  src: ./
  layout: ./layouts

builds:
  default:
    entry: ti-tps54560x.ato:TI_TPS54560
    hide_designators: true
    exclude_checks: [PCB.requires_drc_check]
  usage:
    entry: usage.ato:Usage
    hide_designators: true
    exclude_checks: [PCB.requires_drc_check]

dependencies:
  - type: file
    identifier: atopile/ti-tpsm84209
    path: ../ti-tpsm84209

package:
  identifier: atopile/ti-tps54560x
  repository: https://github.com/atopile/packages
  version: 0.1.7
  authors:
  - name: atopile
    email: hi@atopile.io
  summary: TPS54560x High-Efficiency, Wide, Input-Voltage-Range (4.5V-60V) Buck 
    Regulator, 5A
  license: MIT
