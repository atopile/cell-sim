requires-atopile: ^0.14.0

paths:
    src: ./
    layout: ./layouts

builds:
    default:
        entry: ti-iso1640x.ato:TI_ISO1640QDWRQ1
        hide_designators: true
        exclude_checks: ["PCB.requires_drc_check"]
    usage:
        entry: usage.ato:Usage
        hide_designators: true
        exclude_checks: ["PCB.requires_drc_check"]

package:
    identifier: atopile/ti-iso1640x
    repository: https://github.com/atopile/packages
    homepage: https://github.com/atopile/packages/blob/main/packages/ti-iso1640x/README.md
    version: "0.3.0"
    authors:
        - name: atopile
          email: hi@atopile.io
    summary: "Tags: Texas Instruments; TI; ISO1640; I2C; Isolator; Bidirectional; IC; 1500V; Automotive; SOIC-16"
    license: MIT
