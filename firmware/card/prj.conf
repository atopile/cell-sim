# CellSim Card Firmware - Zephyr Configuration
# Target: STM32H723 + LAN8742A (Zephyr 4.0.0)

# --- Core ---
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# --- Networking ---
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

# Network buffers (required for TCP/UDP)
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_MAX_CONTEXTS=8

# DHCP client (fallback to static if no DHCP)
CONFIG_NET_DHCPV4=y

# DNS / mDNS for card discovery
CONFIG_DNS_RESOLVER=y
CONFIG_MDNS_RESPONDER=y
CONFIG_DNS_SD=y
CONFIG_MDNS_RESOLVER=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME_MAX_LEN=32
CONFIG_ZVFS_POLL_MAX=8

# --- Ethernet ---
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_STM32_HAL=y

# --- I2C ---
CONFIG_I2C=y

# --- SPI (cell ADCs: ADS131M04 via ISO7741 isolators) ---
CONFIG_SPI=y

# --- GPIO ---
CONFIG_GPIO=y

# --- ADC (internal, for input voltage + temperature) ---
CONFIG_ADC=y

# --- Sensor (needed for STM32 internal temp sensor driver) ---
CONFIG_SENSOR=y

# --- MCUboot (OTA firmware update) ---
# Disabled for initial build — requires MCUboot partition table + signing key.
# Re-enable once bootloader integration is done.
# CONFIG_BOOTLOADER_MCUBOOT=y

# --- MCUmgr (SMP over UDP for firmware push from CM5) ---
# Disabled until MCUboot is enabled.
# CONFIG_MCUMGR=y
# CONFIG_MCUMGR_TRANSPORT_UDP=y
# CONFIG_MCUMGR_GRP_IMG=y
# CONFIG_MCUMGR_GRP_OS=y

# --- UART (backplane slot mux for remote flash/debug) ---
CONFIG_SERIAL=y

# --- Watchdog (hardware IWDG for firmware hang recovery) ---
CONFIG_WATCHDOG=y

# --- Internal temperature sensor ---
# Disabled: requires die_temp DT node which nucleo_h723zg base DTS doesn't define.
# Re-enable once custom board DTS is created with proper die_temp node.
# CONFIG_STM32_TEMP=y

# --- Shell (debug console over UART) ---
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# --- Status LED (SK6805-EC20, WS2812-compatible via GPIO bit-bang) ---
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP=y
CONFIG_WS2812_STRIP_GPIO=y

# --- Reboot support (for CMD_REBOOT) ---
CONFIG_REBOOT=y

# --- Float support (needed for health monitoring printfs) ---
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y
